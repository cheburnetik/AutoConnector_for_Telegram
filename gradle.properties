# NOTE: org.gradle.jvmargs intentionally omitted. With it set, `--no-daemon`
# still forks a single-use Gradle daemon whose Kotlin-compile errors aren't
# captured and which DIES in a console-less (hidden scheduled-task) build →
# silent "compileKotlinDesktop FAILED". The build env supplies the client-JVM
# heap via GRADLE_OPTS (-Xmx3072m) instead, and Kotlin compiles in-process, so
# everything runs in ONE JVM with no fork. (No-fork build recipe.)
org.gradle.caching=true
org.gradle.configuration-cache=false

kotlin.code.style=official
kotlin.compiler.execution.strategy=in-process

android.useAndroidX=true
android.nonTransitiveRClass=true
